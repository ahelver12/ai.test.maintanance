                - text: such as the
                - link "built in page fixture" [ref=e1026] [cursor=pointer]:
                  - /url: /docs/test-fixtures#built-in-fixtures
                - text: ", which is passed into your test. Pages are"
                - link "isolated between tests due to the Browser Context" [ref=e1027] [cursor=pointer]:
                  - /url: /docs/browser-contexts
                - text: ", which is equivalent to a brand new browser profile. Every test gets a fresh environment, even when multiple tests run in a single browser."
