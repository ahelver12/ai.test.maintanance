name: Playwright Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    environment: github-pages
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Install Playwright browsers and dependencies
        run: yarn playwright install --with-deps

      - name: Run Playwright tests
        run: yarn playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/**/trace*.zip
            playwright-report/**/trace*.zip
      
      - name: Notify Microsoft Teams on failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d "{
            \"text\": \"❌ Playwright Tests Failed\n\n**PR Title:** ${{ github.event.pull_request.title }}\n**Author:** ${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }}\n**Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" "${{ secrets.TEAMS_WEBHOOK_URL }}"

      - name: Prepare history
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p tmp-gh-pages
          git clone --depth=1 --branch gh-pages https://github.com/${{ github.repository }} tmp-gh-pages || true

          if [ -f tmp-gh-pages/history.json ]; then
            cp tmp-gh-pages/history.json playwright-report/history.json
          else
            echo "[]" > playwright-report/history.json
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          jq --arg timestamp "$TIMESTAMP" \
             --arg run_url "$RUN_URL" \
             --arg sha "${{ github.sha }}" \
             --arg ref "${{ github.ref }}" \
             --arg conclusion "${{ job.status }}" \
             '. += [{
               timestamp: $timestamp,
               run_url: $run_url,
               sha: $sha,
               ref: $ref,
               conclusion: $conclusion
             }]' playwright-report/history.json > playwright-report/history.tmp.json

          mv playwright-report/history.tmp.json playwright-report/history.json

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    env:
      CI: true
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run yarn audit (high and critical only)
        run: |
          yarn audit --level high --json > audit.json
          cat audit.json

      - name: Generate audit summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          if grep -q '"type":"auditAdvisory"' audit.json; then
            echo "High or critical vulnerabilities were found." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            grep '"severity":"high"\|"severity":"critical"' audit.json >> $GITHUB_STEP_SUMMARY || true
            exit 1
          else
            echo "No high or critical vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi